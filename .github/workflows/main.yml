# 示例 workflow 配置（核心部分）
jobs:
  run-fund-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 匹配你的运行环境版本
      
      - name: Install dependencies  # 新增这一步安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytz requests beautifulsoup4  # 安装所需依赖
      
      - name: Run fund monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TZ: Asia/Shanghai
        run: |
          python fund_monitor.py --mode auto
